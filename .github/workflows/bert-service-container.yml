name: bert-service-container

on:
  push:
    branches:
      - main
    paths:
      - 'bert_service/**'
      - 'bert_service/Dockerfile'

permissions:
  contents: read
  id-token: write

env:
  IMAGE_NAME: mras/bert-service

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Compute image tag
        id: meta
        shell: bash
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build BERT service image
        run: |
          docker build \
            -f bert_service/Dockerfile \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }} \
            .

      - name: Push BERT service image
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}

      - name: Update BERT container app image
        run: |
          az containerapp update \
            --name "${{ secrets.BERT_CONTAINERAPP_NAME }}" \
            --resource-group "${{ secrets.BERT_RESOURCE_GROUP }}" \
            --image "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}"

services:
  bert_service:
    build:
      context: .
      dockerfile: bert_service/Dockerfile
    environment:
      BERT_MODEL_DIR: /app/models/distilbert-liar
      BERT_MAX_LENGTH: "256"
      HF_HOME: /app/.cache/huggingface
    ports:
      - "8001:8001"
    volumes:
      - ./bert_service/models:/app/models
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2).status < 500 else 1)"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      bert_service:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      BertService__Url: http://bert_service:8001
      MachineLearning__PythonExecutable: /opt/backend-venv/bin/python
    ports:
      - "5000:5000"
    volumes:
      - ./backend/Services/Ml/artifacts:/app/Services/Ml/artifacts
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
